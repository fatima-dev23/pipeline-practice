#name
name: First Pipeline

#when start
on:
  push:
    branches:
      - main

#jobs
jobs:
  my-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Print name
        run: echo "fatima"

      - name: today date
        run: date

      - name: files list
        run: ls

      - name: disk usage  
        run: df -h